name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          # macOS support is Apple Silicon only.
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          COMMIT="${GITHUB_SHA::8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BINARY="fgm"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="fgm.exe"
          fi

          go build -trimpath \
            -ldflags="-s -w \
              -X github.com/m-amaresh/fgm/internal/cli.Version=${VERSION} \
              -X github.com/m-amaresh/fgm/internal/cli.Commit=${COMMIT} \
              -X github.com/m-amaresh/fgm/internal/cli.Date=${DATE}" \
            -o "$BINARY" \
            ./cmd/fgm

          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE="fgm_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
            zip "$ARCHIVE" "$BINARY"
          else
            ARCHIVE="fgm_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
            tar -czf "$ARCHIVE" "$BINARY"
          fi

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: fgm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
